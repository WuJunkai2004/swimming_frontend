name: 自动生成并同步API文档

on:
  push:
    branches:
      - main
    paths:
      - "src/api/API_docs.md" # 当 API 文档发生变化时触发

permissions:
  contents: read

jobs:
  build-and-sync-docs:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出（Checkout）当前仓库的代码
      - name: 检出当前仓库
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # 3. 运行脚本生成 API 列表 (api.txt)
      - name: 运行 API 列表生成器
        run: node scripts/gen_apilist.js

      # 4. 加载 Gitee 部署私钥
      # 使用 SSH-Agent Action 来安全地加载我们存储在 Secrets 中的私钥
      - name: 加载 Gitee SSH 部署密钥
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GITEE_DEPLOY_PRIVATE_KEY }}

      # 5. 克隆 Gitee 仓库 (已更新为 SSH 方式)
      - name: 克隆 Gitee 文档仓库 (使用 SSH)
        run: |
          # SSH 需要严格的主机密钥检查，Gitee的主机密钥需要被接受
          # 我们在 action runner 中添加 gitee.com 到 known_hosts
          mkdir -p ~/.ssh/
          ssh-keyscan gitee.com >> ~/.ssh/known_hosts

          # 使用 SSH URL 克隆
          git clone git@gitee.com:murphy_955/fzu_swim_association_web.git gitee_docs_repo

      # 6. 将新文档复制到 Gitee 仓库的 docs 文件夹
      - name: 复制并准备提交
        run: |
          echo "正在复制文档..."
          # 确保目标仓库的 docs 目录存在
          mkdir -p gitee_docs_repo/docs/
          # 复制文件，覆盖旧文件
          cp -f src/api/API_docs.md gitee_docs_repo/docs/接口文档.auto.md
          cp -f src/api/API_list.txt gitee_docs_repo/docs/接口文档列表.txt
          echo "复制完成。"

      # 7. 提交并推送到 Gitee
      - name: 提交并推送到 Gitee
        run: |
          cd gitee_docs_repo
          git config user.name "GitHub Action Bot"
          git config user.email "action-bot@github.com"

          git add docs/接口文档.auto.md docs/接口文档列表.txt

          if git diff --staged --quiet; then
            echo "API文档没有变化，无需推送。"
          else
            CURRENT_TIME=$(TZ='Asia/Shanghai' date +'%m月%d日%H时%M分')
            echo "检测到API文档更新，正在提交并推送..."
            git commit -m "docs: 自动更新API接口文档于${CURRENT_TIME}"
            git push
            echo "已成功推送到 Gitee。"
          fi
